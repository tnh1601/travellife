<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đặt tour</title>
  <link rel="stylesheet" href="./dattourngay.css">
</head>
<body>
  <div class="booking-page">
    <div class="booking-box">
      <div class="booking-left">
        <a class="back-link" href="./tkewedbuoi9.html">← Quay lại trang chủ</a>

        <div>
          <h2>Tư vấn tour<br>miễn phí 24/7</h2>
          <p>
            Điền thông tin để nhận tư vấn từ chuyên gia du lịch của chúng tôi.
            Cam kết giá tốt nhất thị trường.
          </p>
        </div>
      </div>

      <div class="booking-right">
        <h3>Đặt tour ngay</h3>

        <div class="form-group">
          <label>Điểm đến</label>
          <select>
            <option>-- Chọn điểm đến --</option>
            <option>Đà Nẵng - Hội An</option>
            <option>Sapa - Fansipan</option>
            <option>Hạ Long</option>
            <option>Phú Quốc</option>
            <option>Đà Lạt</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Ngày đi</label>
            <input type="date">
          </div>

          <div class="form-group">
            <label>Số người</label>
            <input type="number" placeholder="2" min="1">
          </div>
        </div>

        <div class="form-group">
          <label>Họ và tên</label>
          <input type="text" placeholder="Thanh Nhàn">
        </div>

        <div class="form-group">
          <label>Số điện thoại</label>
          <input type="tel" placeholder="0904705192">
        </div>

        <button class="btn-full">Đặt tour ngay →</button>
      </div>
    </div>
  </div>
</body>
</html>
