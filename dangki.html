<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Đăng ký</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="dangki.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>TravelLife</h1>

        <p class="subtitle">Tạo tài khoản để bắt đầu hành trình</p>

        <form id="formDangKi" onsubmit="dangKi(event)">

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="regName" placeholder="Họ và tên" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="regEmail" placeholder="Email" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" id="regPhone" placeholder="Số điện thoại" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="regPassword" placeholder="Mật khẩu" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-shield-halved"></i>
                <input type="password" id="regConfirmPassword" placeholder="Xác nhận mật khẩu" required>
            </div>

            <div class="form-check my-3">
                <input class="form-check-input" type="checkbox" id="agree">

                <label class="form-check-label" for="agree">
                    Tôi đồng ý với điều khoản sử dụng
                </label>
            </div>

            <button type="submit" class="btn-register">
                Tạo tài khoản
            </button>
        </form>

        <p class="login-link">
            Đã có tài khoản?
            <a href="dangnhap.html">Đăng nhập</a>
        </p>

    </div>

</div>
<script>
function dangKi(event) {
  event.preventDefault();

  const name = document.getElementById("regName").value;
  const email = document.getElementById("regEmail").value;
  const phone = document.getElementById("regPhone").value;
  const password = document.getElementById("regPassword").value;
  const confirmPassword = document.getElementById("regConfirmPassword").value;
  const agree = document.getElementById("agree").checked;

  if (password !== confirmPassword) {
    alert("Mật khẩu xác nhận không khớp!");
    return;
  }

  if (!agree) {
    alert("Bạn cần đồng ý với điều khoản sử dụng!");
    return;
  }

  const user = {
    name: name,
    email: email,
    phone: phone,
    password: password
  };

  localStorage.setItem("user", JSON.stringify(user));

  alert("Đăng kí thành công!");
  window.location.href = "dangnhap.html";
}
</script>
</body>
</html>
